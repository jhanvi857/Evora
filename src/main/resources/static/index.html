<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evora | Job Queue Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">E</div>
                <span>Evora Queue</span>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-item active">
                    <i data-lucide="layout"></i>
                    <span>Dashboard</span>
                </a>
                <a href="admin.html" class="nav-item">
                    <i data-lucide="shield"></i>
                    <span>Admin Panel</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="context-selector">
                    <i data-lucide="user"></i>
                    <select id="user-context">
                        <option value="USER-857">USER-857</option>
                        <option value="USER-001">USER-001</option>
                        <option value="USER-999">USER-999</option>
                    </select>
                </div>
            </div>
        </aside>

        <!-- Main View -->
        <main class="main-view">
            <header class="dashboard-header">
                <div class="header-title">
                    <h1 id="view-title">My Jobs</h1>
                    <p>Orchestrate distributed tasks with Event Sourcing</p>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" id="btn-new-order">
                        <i data-lucide="plus"></i> Submit Job
                    </button>
                </div>
            </header>

            <section class="section-card">
                <div class="section-header">
                    <h2>Live Job Stream</h2>
                    <button class="btn-icon" id="btn-refresh"><i data-lucide="rotate-cw"></i></button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Job ID</th>
                            <th>Type</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Last Step</th>
                            <th>Timestamp</th>
                            <th>Trace</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody">
                        <!-- Dynamic Rows -->
                    </tbody>
                </table>
            </section>
        </main>

        <!-- Modals & Drawers -->
        <div class="modal-overlay" id="order-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Submit New Job</h2>
                    <button class="btn-close" id="close-modal"><i data-lucide="x"></i></button>
                </div>
                <form id="place-order-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Job Type</label>
                            <select id="job-type">
                                <option value="DATA_PROCESSING">Data Processing</option>
                                <option value="IMAGE_RESIZE">Image Resizing</option>
                                <option value="EMAIL_BATCH">Email Batch</option>
                                <option value="REPORT_GEN">Report Generation</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Priority</label>
                            <select id="job-priority">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Simulate Error (Saga Compensation)</label>
                        <select id="order-scenario">
                            <option value="happy">No Error (Happy Path)</option>
                            <option value="validation-fail">Validation Failed</option>
                            <option value="execution-fail">Execution Failed</option>
                            <option value="notification-fail">Notification Failed</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payload (JSON)</label>
                        <textarea id="job-payload" class="mono" rows="5" placeholder='{"key": "value"}'></textarea>
                    </div>
                    <div class="form-group">
                        <label>Idempotency Key</label>
                        <input type="text" id="idempotency-key" class="mono" placeholder="unique-request-id">
                    </div>
                    
                    <button type="submit" class="btn-submit" id="submit-order">Submit to Queue</button>
                    <input type="hidden" id="order-id">
                </form>
            </div>
        </div>

        <aside class="drawer" id="timeline-drawer">
            <div class="modal-header">
                <h2>Job Execution Trace</h2>
                <button id="close-drawer" class="btn-close"><i data-lucide="x"></i></button>
            </div>
            <div class="drawer-meta" style="margin-bottom:20px;">
                <p id="drawer-order-id" class="mono"></p>
                <span id="drawer-status" class="badge"></span>
            </div>
            <div id="event-timeline" class="event-timeline"></div>
        </aside>
    </div>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
