<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evora | System Administration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon admin">A</div>
                <span>Evora Admin</span>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="nav-item">
                    <i data-lucide="layout"></i>
                    <span>Dashboard</span>
                </a>
                <a href="admin.html" class="nav-item active">
                    <i data-lucide="shield"></i>
                    <span>Admin Panel</span>
                </a>
            </nav>

            <div class="sidebar-footer" style="padding:20px 0; border-top: 1px solid var(--border);">
                <div style="font-size:11px; color:var(--text-muted);">Root Access Granted</div>
            </div>
        </aside>

        <!-- Main View -->
        <main class="main-view">
            <header class="dashboard-header">
                <div class="header-title">
                    <h1>Queue Telemetry</h1>
                    <p>Global throughput and worker health metrics</p>
                </div>
                <div class="header-actions" style="display:flex; gap:10px;">
                    <button class="btn-primary" id="btn-replay" style="background:var(--accent-blue);">
                        <i data-lucide="rotate-ccw"></i> Replay Events
                    </button>
                    <button class="btn-primary" id="btn-refresh"><i data-lucide="refresh-cw"></i> Refresh</button>
                </div>
            </header>

            <section class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-icon purple"><i data-lucide="layers"></i></div>
                    <div class="metric-info">
                        <label>Total Jobs</label>
                        <h2 id="metric-total-jobs">0</h2>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon green"><i data-lucide="zap"></i></div>
                    <div class="metric-info">
                        <label>Success Rate</label>
                        <h2 id="metric-success-rate">0%</h2>
                    </div>
                </div>
                <div class="metric-card">
                    <div class="metric-icon yellow"><i data-lucide="alert-circle"></i></div>
                    <div class="metric-info">
                        <label>Failed Jobs</label>
                        <h2 id="metric-failed-jobs">0</h2>
                    </div>
                </div>
            </section>

            <section class="section-card">
                <div class="section-header">
                    <h2>Global Job Stream</h2>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Job ID</th>
                            <th>User</th>
                            <th>Type</th>
                            <th>Priority</th>
                            <th>State</th>
                            <th>Timestamp</th>
                            <th>Trace</th>
                        </tr>
                    </thead>
                    <tbody id="orders-tbody"></tbody>
                </table>
            </section>
        </main>

        <aside class="drawer" id="timeline-drawer">
            <div class="modal-header">
                <h2>Raw Event Trace</h2>
                <button id="close-drawer" class="btn-close"><i data-lucide="x"></i></button>
            </div>
            <div class="drawer-meta" style="margin-bottom:20px;">
                <p id="drawer-order-id" class="mono"></p>
                <span id="drawer-status" class="badge"></span>
            </div>
            <div id="event-timeline" class="event-timeline"></div>
        </aside>
    </div>
    <script src="admin-script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
